services:
  skills-runner:
    build: ./skills-runner
    container_name: cursor-skills-runner
    restart: unless-stopped
    env_file: .env
    environment:
      CONFIG_DIR: /config
      WORKSPACE_DIR: /workspaces
      DEPLOY_DEST_PORTAIL_CLUB: /deploy/portailClub
      LOG_DIR: /app/logs
      TZ: ${TZ:-Europe/Paris}
    volumes:
      - ./config:/config:ro
      - ./skills-runner/deploy:/deploy-scripts:ro
      - ./workspaces:/workspaces
      - ./logs:/app/logs
      - ./secrets:/secrets:ro
      - /volume1/web/portailClub:/deploy/portailClub
    ports:
      - "127.0.0.1:${RUNNER_HOST_PORT:-8765}:8080"
    networks:
      - cursor-auto-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  n8n:
    image: n8nio/n8n:latest
    container_name: cursor-n8n
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: ${TZ:-Europe/Paris}
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL:-http://localhost:5678}
      WEBHOOK_URL: ${WEBHOOK_URL:-}
      N8N_SECURE_COOKIE: ${N8N_SECURE_COOKIE:-false}
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      GENERIC_TIMEZONE: Europe/Paris
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      RUNNER_API_KEY: ${RUNNER_API_KEY}
      N8N_USER_FOLDER: /data
    volumes:
      - ./n8n_data:/data
    ports:
      - "127.0.0.1:${N8N_HOST_PORT:-5678}:5678"
    networks:
      - cursor-auto-net
    depends_on:
      skills-runner:
        condition: service_healthy

networks:
  cursor-auto-net:
    driver: bridge